name: PR CI

concurrency:
  group: pull-request-${{ github.event.number }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main

jobs:
  clippy:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        uses: giraffate/clippy-action@v1.0.1
        with:
          reporter: github-pr-check
          github_token: ${{ secrets.GITHUB_TOKEN }}

  fmt:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run rustfmt
        run: cargo fmt --all -- --check

  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Cache Wrangler
        id: wrangler-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-wrangler-4.110.0

      - name: Setup Wrangler
        if: steps.wrangler-cache.outputs.cache-hit != 'true'
        run: npm install wrangler@4.110.0
        
      - name: Add Wrangler to PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> $GITHUB_PATH
        
      - name: Setup Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          
      - uses: Swatinem/rust-cache@v2

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Check code (Clippy)
        run: cargo clippy -- -D warnings
        
      - uses: cargo-bins/cargo-binstall@main
      
      - name: Install worker-build
        run: cargo binstall worker-build -y --no-confirm

      - name: Deploy
        run: wrangler deploy --dry-run